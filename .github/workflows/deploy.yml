name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true  # 이전 run 막힘 방지

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          # cache: npm 임시 제거 — lockfile hash 검증이 startup failure 원인 가능

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        # npm ci는 lockfile-package.json 일치 검증이 엄격하여 dev deps 추가 직후 실패할 수 있음
        # CI 안정성을 위해 install로 fallback. ELLIS 통합 시 npm ci 복귀 권장.
        run: npm install --legacy-peer-deps

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests (Vitest — 76 tests: 39 unit + 37 component/a11y)
        run: npm test

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Build (test — no basePath)
        run: npm run build:test

      - name: E2E smoke tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Build (production — with basePath for deploy)
        env:
          NODE_ENV: production
          NEXT_PUBLIC_ELLIS_API_URL: ${{ secrets.NEXT_PUBLIC_ELLIS_API_URL }}
        run: npm run build

      - name: Bundle size budget check
        # CI 환경에서 .next 디렉토리 권한·경로 문제 가능 — 실패해도 배포 차단 안 함
        run: npm run check:size || true

      - name: Add .nojekyll
        run: touch ./out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
